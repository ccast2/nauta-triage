services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: triage
      POSTGRES_USER: triage
      POSTGRES_PASSWORD: triage
    ports: ["${DB_HOST_PORT:-15432}:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U triage"]
      interval: 2s
      timeout: 3s
      retries: 20

  carrier-portal:
    image: wiremock/wiremock:3.9.1
    volumes:
      - ./simulators/carrier-portal:/home/wiremock
    command: ["--global-response-templating","--port","8080"]
    ports: ["${CARRIER_PORTAL_HOST_PORT:-19001}:8080"]

  terminal-feed:
    image: wiremock/wiremock:3.9.1
    volumes:
      - ./simulators/terminal-feed:/home/wiremock
    command: ["--global-response-templating","--port","8080"]
    ports: ["${TERMINAL_FEED_HOST_PORT:-19002}:8080"]

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
      carrier-portal:
        condition: service_started
      terminal-feed:
        condition: service_started
    environment:
      DB_URL: jdbc:postgresql://db:5432/triage
      DB_USER: triage
      DB_PASSWORD: triage
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      LLM_ENABLED: ${LLM_ENABLED:-true}
    ports: ["${APP_HOST_PORT:-18080}:8080"]

  web:
    build:
      context: ./web
      dockerfile: Dockerfile.dev
    depends_on:
      - app
    environment:
      VITE_API_BASE_URL: http://localhost:${APP_HOST_PORT:-18080}
    ports: ["${WEB_HOST_PORT:-13000}:5173"]
    volumes:
      - ./web:/app
      - /app/node_modules
